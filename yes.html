<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Love You Too!</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="success-page">
    <div class="container">
        <!-- Floating Hearts -->
        <div class="hearts">
            <span style="--i:1">💕</span>
            <span style="--i:2">💖</span>
            <span style="--i:3">💗</span>
            <span style="--i:4">💝</span>
            <span style="--i:5">💘</span>
            <span style="--i:6">💕</span>
            <span style="--i:7">💖</span>
            <span style="--i:8">💗</span>
            <span style="--i:9">💝</span>
            <span style="--i:10">💘</span>
        </div>
        
        <!-- Happy Pandas Hugging -->
        <div class="pandas-hugging">
            <div class="panda bubu happy">
                <div class="ear left"></div>
                <div class="ear right"></div>
                <div class="face">
                    <div class="eye left happy-eye"></div>
                    <div class="eye right happy-eye"></div>
                    <div class="nose"></div>
                    <div class="mouth smile"></div>
                    <div class="blush left"></div>
                    <div class="blush right"></div>
                </div>
                <div class="heart-above">💕</div>
            </div>
            
            <div class="panda dudu happy">
                <div class="ear left"></div>
                <div class="ear right"></div>
                <div class="face">
                    <div class="eye left happy-eye"></div>
                    <div class="eye right happy-eye"></div>
                    <div class="nose"></div>
                    <div class="mouth smile"></div>
                    <div class="blush left"></div>
                    <div class="blush right"></div>
                </div>
                <div class="heart-above">💕</div>
            </div>
        </div>
        
        <!-- Love Message -->
        <div class="love-message">
            <h1>I Love You Too! 💖</h1>
            <p class="big-text">Yay! You said YES!</p>
            <p class="sub-text">Bubu & Dudu are so happy!</p>
            <div class="floating-hearts">
                <span>💕</span><span>💖</span><span>💗</span><span>💝</span><span>💘</span>
            </div>
        </div>
        
        <button class="btn reset-btn" onclick="window.location.href='index.html'">
            Send to Someone Else 💌
        </button>
    </div>
</body>
</html>
