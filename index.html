<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Be My Valentine?</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Floating Hearts Background -->
        <div class="hearts">
            <span>💕</span>
            <span>💖</span>
            <span>💗</span>
            <span>💝</span>
            <span>💘</span>
            <span>💕</span>
            <span>💖</span>
            <span>💗</span>
            <span>💝</span>
            <span>💘</span>
            <span>💕</span>
            <span>💖</span>
            <span>💗</span>
            <span>💝</span>
            <span>💘</span>
        </div>
    </body>
<script>
    function createHeart() {
        const heart = document.createElement('div');
        heart.innerHTML = ['💕','💖','💗','💝','💘'][Math.floor(Math.random() * 5)];
        heart.style.position = 'fixed';
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.top = '-50px';
        heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
        heart.style.animation = `fall ${Math.random() * 3 + 3}s linear forwards`;
        heart.style.zIndex = '0';
        heart.style.opacity = '0.7';
        document.body.appendChild(heart);
        
        setTimeout(() => heart.remove(), 6000);
    }
    
    // Create hearts every 300ms
    setInterval(createHeart, 300);
    
    // Add fall animation
    const style = document.createElement('style');
    style.innerHTML = `
        @keyframes fall {
            to {
                transform: translateY(110vh) rotate(360deg);
                opacity: 0;
            }
        }
    `;
    document.head.appendChild(style);
</script>


        
        <!-- Bubu Dudu Pandas -->
        <div class="pandas-container">
            <!-- Bubu (White Panda) -->
            <div class="panda bubu">
                <div class="ear left"></div>
                <div class="ear right"></div>
                <div class="face">
                    <div class="eye left">
                        <div class="pupil"></div>
                    </div>
                    <div class="eye right">
                        <div class="pupil"></div>
                    </div>
                    <div class="nose"></div>
                    <div class="mouth"></div>
                    <div class="blush left"></div>
                    <div class="blush right"></div>
                </div>
                <div class="body"></div>
                <div class="arm left"></div>
                <div class="arm right"></div>
            </div>
            
            <!-- Dudu (Brown Panda) -->
            <div class="panda dudu">
                <div class="ear left"></div>
                <div class="ear right"></div>
                <div class="face">
                    <div class="eye left">
                        <div class="pupil"></div>
                    </div>
                    <div class="eye right">
                        <div class="pupil"></div>
                    </div>
                    <div class="nose"></div>
                    <div class="mouth"></div>
                    <div class="blush left"></div>
                    <div class="blush right"></div>
                </div>
                <div class="body"></div>
                <div class="arm left"></div>
                <div class="arm right"></div>
            </div>
        </div>
        
        <!-- Question -->
        <div class="question-box">
            <h1>Will You Be My Valentine?</h1>
            <p class="subtitle">Bubu & Dudu want to know 💕</p>
        </div>
        
        <!-- Buttons -->
        <div class="buttons">
            <button id="yesBtn" class="btn yes-btn" onclick="sayYes()">
                YES 💖
            </button>
            <button id="noBtn" class="btn no-btn" onclick="sayNo()">
                NO 💔
            </button>
        </div>
        
        <!-- Message for No button -->
        <p id="message" class="message"></p>
    </div>
    
    <script>
        let yesSize = 1;
        let noClicks = 0;
        const messages = [
            "Are you sure? 🥺",
            "Pretty please? 🥹",
            "Dudu is sad now 😢",
            "Dudu will cry 💔",
            "Think again! 💭",
            "You can't say no! 🚫",
            "Yes is the only option! ✅",
            "My heart is breaking 💔",
            "Last chance! ⚠️",
            "Okay now you're just being mean 😭"
        ];
        
        function sayNo() {
            noClicks++;
            yesSize += 0.5;
            
            // Increase Yes button size
            const yesBtn = document.getElementById('yesBtn');
            yesBtn.style.transform = `scale(${yesSize})`;
            
            // Show message
            const message = document.getElementById('message');
            message.textContent = messages[Math.min(noClicks - 1, messages.length - 1)];
            message.style.display = 'block';
            
            // Move No button to random position (it runs away!)
            const noBtn = document.getElementById('noBtn');
            const container = document.querySelector('.buttons');
            const maxX = container.offsetWidth - noBtn.offsetWidth;
            const maxY = container.offsetHeight - noBtn.offsetHeight;
            
            const randomX = Math.random() * maxX;
            const randomY = Math.random() * maxY;
            
            noBtn.style.position = 'absolute';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }
        
        function sayYes() {
            window.location.href = 'yes.html';
        }
    </script>
</body>
</html>
